<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ngữ pháp — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <a class="back-link" id="back-lesson" style="text-decoration:none;display:inline-flex;align-items:center" href="#">← bài học</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="lesson-head"><h1 id="title">Ngữ pháp</h1></div>
    <div class="cards" id="cards"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const lessonId = params.get('id');
    let level = params.get('level') || 'mam';
    const cards = document.getElementById('cards');
    document.getElementById('back-lesson').href = 'lesson.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level);

    function preview(j) {
      for (const s of (j.sections || [])) {
        for (const b of (s.blocks || [])) {
          if (b.type === 'text' && b.text) return b.text;
        }
        for (const b of (s.blocks || [])) {
          if (b.type === 'example' && b.vi) return b.vi + (b.en ? ' — ' + b.en : '');
        }
      }
      return 'Xem chi tiết →';
    }

    (async function () {
      let lesson;
      try {
        const r = await fetch(level + '/lessons/' + lessonId + '.json', { cache: 'no-cache' });
        lesson = await r.json();
      } catch (e) { cards.innerHTML = '<p class="note">Không tải được bài học.</p>'; return; }

      document.title = 'Ngữ pháp — ' + (lesson.title || lessonId);
      document.getElementById('title').textContent = 'Ngữ pháp — ' + (lesson.title || lessonId);

      const inputs = lesson.inputs || [];
      if (!inputs.length) { cards.innerHTML = '<p class="note">Bài này chưa có điểm ngữ pháp.</p>'; return; }

      inputs.forEach(function (inp, i) {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = 'input.html?id=' + encodeURIComponent(inp.id) + '&level=' + encodeURIComponent(level);
        const head = document.createElement('div'); head.className = 'card-head';
        const h3 = document.createElement('h3'); h3.textContent = inp.title || inp.id;
        head.appendChild(h3);
        const badge = document.createElement('span'); badge.className = 'badge'; badge.textContent = (i + 1) + '/' + inputs.length;
        head.appendChild(badge);
        a.appendChild(head);
        const p = document.createElement('p'); p.textContent = '…'; a.appendChild(p);
        const go = document.createElement('div'); go.className = 'go'; go.textContent = 'Xem chi tiết →'; a.appendChild(go);
        cards.appendChild(a);
        // nạp preview
        fetch(level + '/inputs/' + inp.id + '.json', { cache: 'no-cache' })
          .then(r => r.ok ? r.json() : null)
          .then(j => { if (j) p.textContent = preview(j); })
          .catch(() => {});
      });
    })();
  </script>
</body>
</html>
