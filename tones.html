<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tone map — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .tap-hint { display: inline-flex; align-items: center; gap: 8px; background: var(--yellow); border: 1.5px solid var(--stroke); border-radius: 999px; padding: 8px 16px; font-weight: 700; font-family: var(--font-display); font-size: .9rem; color: var(--ink); margin-bottom: 18px; }

    .tones-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 720px) { .tones-grid { grid-template-columns: 1fr 1fr; } }

    .tone-card { background: var(--surface); border: 1.5px solid var(--stroke); border-radius: var(--radius); padding: 20px 22px; }
    .tone-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .tone-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--ink); }
    .tone-desc { background: #EFEFE9; border: 1.5px solid var(--stroke); border-radius: 8px; padding: 4px 10px; font-size: .78rem; color: var(--muted); text-align: right; line-height: 1.25; white-space: nowrap; }

    .tone-mid { display: flex; align-items: center; gap: 14px; margin: 6px 0 4px; }
    .tone-letter { font-size: 3.4rem; font-weight: 700; font-family: var(--font-display); line-height: 1; width: 70px; text-align: center; flex: none; cursor: pointer; border-radius: 12px; transition: transform .1s ease, background .15s ease; }
    .tone-letter:hover { background: #F3F2FF; }
    .tone-letter:active { transform: scale(.94); }
    .contour { flex: 1; height: 84px; max-width: 240px; margin-left: auto; }
    .contour .grid { stroke: #D8D8D8; stroke-width: 1; stroke-dasharray: 3 3; }
    .contour .lbl { fill: #A6A6A6; font-size: 9px; font-family: var(--font-body); }

    .tone-rule { border-top: 1px solid #E6E6E6; margin: 6px 0 12px; }
    .tone-ex { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tone-ex .word { font-size: 1.25rem; font-weight: 700; font-family: var(--font-display); color: var(--ink); cursor: pointer; padding: 2px 6px; border-radius: 8px; border-bottom: 2px dotted var(--muted); transition: background .15s ease; }
    .tone-ex .word:hover { background: #F3F2FF; }
    .tone-ex .word:active { transform: scale(.96); }
    .tone-ex .mean { color: var(--ink); }
    .playing { background: var(--primary) !important; }

    .eq-badge { background: #DCEFE4; border: 1.5px solid #1E7A5E; border-radius: 8px; padding: 3px 11px; text-align: center; font-size: .76rem; color: #1E7A5E; line-height: 1.25; font-weight: 700; }
    .eq-badge small { display: block; font-weight: 600; }

    .tone-note { margin-top: 18px; background: #F4F4EC; border: 1.5px solid var(--stroke); border-radius: 14px; padding: 14px 18px; display: flex; gap: 12px; align-items: flex-start; line-height: 1.5; }
    .tone-note .sym { font-size: 1.2rem; color: var(--accent-deep); flex: none; font-weight: 700; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <a class="back-link" id="back-link" href="lessons.html?level=mam">← bài học</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="lesson-head"><h1>Tone map <span class="title-en" id="subtitle"></span></h1></div>
    <div><span class="tap-hint">🔊 Bấm vào chữ cái hoặc từ để nghe phát âm</span></div>
    <div class="tones-grid" id="grid"></div>
    <div class="tone-note" id="tone-note"></div>
  </main>

  <footer class="footer"><div class="wrap">hoc voi hanh · học đi đôi với hành</div></footer>

  <script>
    let voice = 'nam';
    try { voice = localStorage.getItem('voice') || 'nam'; } catch (e) {}

    const player = new Audio();
    let lastEl = null;
    function play(name, el) {
      if (lastEl) lastEl.classList.remove('playing');
      lastEl = el; if (el) el.classList.add('playing');
      try { player.pause(); player.src = 'audio/tones/' + voice + '/' + name + '.mp3'; player.currentTime = 0; player.play().catch(() => {}); } catch (e) {}
    }
    player.addEventListener('ended', () => { if (lastEl) lastEl.classList.remove('playing'); });
    player.addEventListener('error', () => { if (lastEl) lastEl.classList.remove('playing'); });

    function contour(type, color) {
      const grid = '<line class="grid" x1="44" y1="16" x2="190" y2="16"/><line class="grid" x1="44" y1="42" x2="190" y2="42"/><line class="grid" x1="44" y1="68" x2="190" y2="68"/>'
        + '<text class="lbl" x="34" y="19">H</text><text class="lbl" x="34" y="45">M</text><text class="lbl" x="34" y="71">L</text>';
      let shape = '';
      const sw = 'stroke="' + color + '" stroke-width="2.6" fill="none" stroke-linecap="round"';
      if (type === 'flat') shape = '<line x1="50" y1="42" x2="186" y2="42" ' + sw + '/>';
      else if (type === 'fall') shape = '<path d="M50,38 L186,62" ' + sw + '/>';
      else if (type === 'dip') shape = '<path d="M54,44 Q118,72 182,48" ' + sw + '/>';
      else if (type === 'dipDash') shape = '<path d="M54,44 Q118,72 182,48" ' + sw + ' stroke-dasharray="6 4"/>';
      else if (type === 'dipRise') shape = '<path d="M52,40 Q104,74 134,54 Q160,38 184,22" ' + sw + '/>';
      else if (type === 'rise') shape = '<path d="M50,55 L186,22" ' + sw + '/>';
      else if (type === 'broken') shape = '<path d="M52,52 L98,44" ' + sw + '/><path d="M120,46 Q150,46 184,20" ' + sw + '/><line x1="108" y1="34" x2="108" y2="56" stroke="' + color + '" stroke-width="1.6" stroke-dasharray="2 2"/>';
      else if (type === 'drop') shape = '<path d="M52,40 L168,60" ' + sw + '/><circle cx="172" cy="61" r="3.4" fill="' + color + '"/>';
      return '<svg class="contour" viewBox="0 0 200 84" xmlns="http://www.w3.org/2000/svg">' + grid + shape + '</svg>';
    }

    // Miền Nam: hỏi ≈ ngã (5 thanh phân biệt)
    const NAM = [
      { id: 'ngang', name: 'Ngang', desc: ['flat', 'mid'], letter: 'a', color: '#6E6E6E', shape: 'flat', word: 'ma', mean: 'ghost' },
      { id: 'huyen', name: 'Huyền', desc: ['low', 'falling'], letter: 'à', color: '#2D6CA8', shape: 'fall', word: 'mà', mean: 'but / yet' },
      { id: 'hoi', name: 'Hỏi', desc: ['low', 'dipping'], letter: 'ả', color: '#1E7A5E', shape: 'dip', word: 'mả', mean: 'tomb', eq: 'ngã' },
      { id: 'nga', name: 'Ngã', desc: ['dipping'], letter: 'ã', color: '#1E7A5E', shape: 'dipDash', word: 'mã', mean: 'code / horse', eq: 'hỏi' },
      { id: 'sac', name: 'Sắc', desc: ['high', 'rising'], letter: 'á', color: '#C68A1E', shape: 'rise', word: 'má', mean: 'mom / cheek' },
      { id: 'nang', name: 'Nặng', desc: ['low + stop'], letter: 'ạ', color: '#9B3A2C', shape: 'drop', word: 'mạ', mean: 'rice seedling' },
    ];
    // Miền Bắc: đủ 6 thanh, ngã ≠ hỏi
    const BAC = [
      { id: 'ngang', name: 'Ngang', desc: ['flat', 'mid'], letter: 'a', color: '#6E6E6E', shape: 'flat', word: 'ma', mean: 'ghost' },
      { id: 'huyen', name: 'Huyền', desc: ['low', 'falling'], letter: 'à', color: '#2D6CA8', shape: 'fall', word: 'mà', mean: 'but / yet' },
      { id: 'hoi', name: 'Hỏi', desc: ['dipping', 'rising'], letter: 'ả', color: '#1E7A5E', shape: 'dipRise', word: 'mả', mean: 'tomb' },
      { id: 'nga', name: 'Ngã', desc: ['broken', 'rising'], letter: 'ã', color: '#8E44AD', shape: 'broken', word: 'mã', mean: 'code / horse' },
      { id: 'sac', name: 'Sắc', desc: ['high', 'rising'], letter: 'á', color: '#C68A1E', shape: 'rise', word: 'má', mean: 'mom / cheek' },
      { id: 'nang', name: 'Nặng', desc: ['low + stop'], letter: 'ạ', color: '#9B3A2C', shape: 'drop', word: 'mạ', mean: 'rice seedling' },
    ];

    const isBac = voice === 'bac';
    const TONES = isBac ? BAC : NAM;
    document.getElementById('subtitle').textContent = isBac ? '(tiếng miền bắc)' : '(tiếng miền nam)';
    document.getElementById('tone-note').innerHTML = isBac
      ? '<span class="sym">≠</span><div><strong>Miền Bắc:</strong> đủ 6 thanh phân biệt rõ — thanh ngã (lên giọng, có tắc thanh hầu) khác hẳn thanh hỏi (xuống rồi lên).</div>'
      : '<span class="sym">≈</span><div><strong>Miền Nam:</strong> thanh hỏi và thanh ngã phát âm như nhau — học viên thực tế chỉ cần phân biệt 5 thanh.</div>';

    const grid = document.getElementById('grid');
    TONES.forEach(t => {
      const c = document.createElement('div'); c.className = 'tone-card';
      const eq = t.eq ? '<span class="eq-badge">=<small>' + t.eq + '</small></span>' : '';
      c.innerHTML =
        '<div class="tone-top"><span class="tone-name">' + t.name + '</span>'
        + '<span class="tone-desc">' + t.desc.join('<br>') + '</span></div>'
        + '<div class="tone-mid"><span class="tone-letter" style="color:' + t.color + '">' + t.letter + '</span>'
        + contour(t.shape, t.color) + '</div>'
        + '<div class="tone-rule"></div>'
        + '<div class="tone-ex"><span class="word">' + t.word + '</span><span class="mean">' + t.mean + '</span>' + eq + '</div>';
      const letterEl = c.querySelector('.tone-letter');
      const wordEl = c.querySelector('.word');
      letterEl.addEventListener('click', () => play('a_' + t.id, letterEl));
      wordEl.addEventListener('click', () => play('ma_' + t.id, wordEl));
      grid.appendChild(c);
    });
  </script>
</body>
</html>
