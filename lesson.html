<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài học — Học với Hạnh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="site-header">
  <div class="logo">Học với <span>Hạnh</span></div>
  <nav>
    <a href="index.html">Trang chủ</a>
  </nav>
</header>

<!-- ========== MAIN ========== -->
<main class="container">

  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M13 8H3M7 4L3 8l4 4"/>
    </svg>
    Tất cả bài học
  </a>

  <!-- Lesson header (title, level, description) -->
  <div class="lesson-header" id="lesson-header">
    <div style="color:var(--text-muted);font-size:.9rem;">Đang tải bài học…</div>
  </div>

  <!-- Controls: toggle meanings, toggle translations -->
  <div class="controls-bar" id="controls-bar" style="margin-bottom:20px; display:none;">
    <button class="toggle-btn active" id="btn-meanings" title="Ẩn/hiện nghĩa tiếng Anh của từng cụm từ">
      <span class="dot"></span> Nghĩa từ
    </button>
    <button class="toggle-btn active" id="btn-translations" title="Ẩn/hiện bản dịch toàn câu">
      <span class="dot"></span> Dịch câu
    </button>
  </div>

  <!-- Audio player (whole story) -->
  <div class="audio-section" id="audio-section" style="display:none;">
    <label>🎵 Nghe toàn bài:</label>
    <audio id="main-audio" controls preload="metadata">
      Trình duyệt của bạn không hỗ trợ audio.
    </audio>
    <span class="audio-fallback" id="audio-fallback" style="display:none;">
      (Chưa có file audio — click vào từng cụm để nghe phát âm)
    </span>
  </div>

  <!-- Sentences -->
  <div class="sentences-list" id="sentences-list"></div>

</main>

<!-- ========== FOOTER ========== -->
<footer class="site-footer">
  <p>Học với Hạnh &copy; 2025 &nbsp;·&nbsp; Tiếng Việt cho người nước ngoài</p>
</footer>

<!-- TTS status toast -->
<div class="tts-status" id="tts-status"></div>

<script>
/* ============================================================
   lesson.html — Interactive lesson renderer
   ============================================================ */

// ---- State ----
let showMeanings      = true;
let showTranslations  = true;
let currentChunk      = null;

// ---- URL param ----
const params    = new URLSearchParams(location.search);
const lessonFile = params.get('lesson');

// ---- TTS ----
const synth = window.speechSynthesis;
let ttsVoice = null;

function findVietnameseVoice() {
  const voices = synth.getVoices();
  // prefer vi-VN voices
  ttsVoice = voices.find(v => v.lang.startsWith('vi'))
           || voices.find(v => v.lang.startsWith('zh')) // fallback: Chinese tones
           || voices[0] || null;
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = findVietnameseVoice;
}
findVietnameseVoice();

function speak(text, chunkEl) {
  if (!synth) return;
  synth.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'vi-VN';
  utt.rate  = 0.85;
  utt.pitch = 1;
  if (ttsVoice) utt.voice = ttsVoice;

  // visual feedback
  if (currentChunk) currentChunk.classList.remove('playing');
  chunkEl.classList.add('playing');
  currentChunk = chunkEl;

  showToast('🔊 ' + text);

  utt.onend = () => {
    chunkEl.classList.remove('playing');
    if (currentChunk === chunkEl) currentChunk = null;
  };
  utt.onerror = () => chunkEl.classList.remove('playing');

  synth.speak(utt);
}

// ---- Toast ----
function showToast(msg) {
  const el = document.getElementById('tts-status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

// ---- Audio fallback check ----
function setupMainAudio(audioFile) {
  const section  = document.getElementById('audio-section');
  const audioEl  = document.getElementById('main-audio');
  const fallback = document.getElementById('audio-fallback');

  section.style.display = 'flex';

  if (audioFile) {
    audioEl.src = audioFile;
    audioEl.style.display = '';
    fallback.style.display = 'none';

    audioEl.addEventListener('error', () => {
      audioEl.style.display = 'none';
      fallback.style.display = '';
    });
  } else {
    audioEl.style.display = 'none';
    fallback.style.display = '';
  }
}

// ---- Render ----
function renderLesson(data) {
  document.title = (data.title || 'Bài học') + ' — Học với Hạnh';

  // Header
  const header = document.getElementById('lesson-header');
  header.innerHTML = `
    <h1>${data.title || 'Bài học'}</h1>
    <div class="lesson-meta">
      ${data.level ? `<span class="badge">${data.level}</span>` : ''}
      ${data.description ? `<span class="desc">${data.description}</span>` : ''}
    </div>
  `;
  // Append controls into header bottom
  document.getElementById('controls-bar').style.display = 'flex';

  // Audio
  setupMainAudio(data.audio_file || null);

  // Sentences
  const list = document.getElementById('sentences-list');
  list.innerHTML = '';

  (data.sentences || []).forEach((sentence, si) => {
    const block = document.createElement('div');
    block.className = 'sentence-block';

    // Sentence number
    const numEl = document.createElement('div');
    numEl.className = 'sentence-num';
    numEl.textContent = `Câu ${si + 1}`;
    block.appendChild(numEl);

    // Chunks row
    const chunksRow = document.createElement('div');
    chunksRow.className = 'chunks-row';

    (sentence.chunks || []).forEach(chunk => {
      const chunkEl = document.createElement('div');
      chunkEl.className = 'chunk';
      chunkEl.setAttribute('role', 'button');
      chunkEl.setAttribute('tabindex', '0');
      chunkEl.setAttribute('aria-label', `${chunk.word} — ${chunk.meaning}`);
      chunkEl.title = `Click để nghe: ${chunk.word}`;

      const wordEl = document.createElement('span');
      wordEl.className = 'chunk-viet';
      wordEl.textContent = chunk.word;

      const meanEl = document.createElement('span');
      meanEl.className = 'chunk-meaning' + (showMeanings ? '' : ' hidden');
      meanEl.textContent = chunk.meaning;

      chunkEl.appendChild(wordEl);
      chunkEl.appendChild(meanEl);

      // Click / keyboard to speak
      const playChunk = () => speak(chunk.word, chunkEl);
      chunkEl.addEventListener('click', playChunk);
      chunkEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); playChunk(); }
      });

      chunksRow.appendChild(chunkEl);
    });

    block.appendChild(chunksRow);

    // Translation row
    const transDiv = document.createElement('div');
    transDiv.className = 'sentence-translation' + (showTranslations ? '' : ' hidden');
    transDiv.textContent = '🇬🇧 ' + (sentence.english || '');

    block.appendChild(transDiv);

    list.appendChild(block);
  });
}

// ---- Toggle handlers ----
document.getElementById('btn-meanings').addEventListener('click', function () {
  showMeanings = !showMeanings;
  this.classList.toggle('active', showMeanings);
  document.querySelectorAll('.chunk-meaning').forEach(el =>
    el.classList.toggle('hidden', !showMeanings)
  );
});

document.getElementById('btn-translations').addEventListener('click', function () {
  showTranslations = !showTranslations;
  this.classList.toggle('active', showTranslations);
  document.querySelectorAll('.sentence-translation').forEach(el =>
    el.classList.toggle('hidden', !showTranslations)
  );
});

// ---- Load lesson JSON ----
async function init() {
  if (!lessonFile) {
    document.getElementById('lesson-header').innerHTML =
      '<p style="color:var(--text-muted)">Không tìm thấy bài học. <a href="index.html">Quay về trang chủ</a></p>';
    return;
  }

  try {
    const res = await fetch(lessonFile);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderLesson(data);
  } catch (err) {
    document.getElementById('lesson-header').innerHTML =
      `<p style="color:var(--text-muted)">Không tải được bài học (<code>${lessonFile}</code>). <a href="index.html">Quay về trang chủ</a></p>`;
    console.error('Lesson load error:', err);
  }
}

init();
</script>
</body>
</html>
