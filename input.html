<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Core inputs — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <select class="level-select" id="level-select" aria-label="Chọn cấp độ">
            <option value="">các lớp</option>
            <option value="mam">lớp mầm</option>
            <option value="choi">lớp chồi</option>
            <option value="la">lớp lá</option>
          </select>
          <select class="voice-select" id="voice-select" aria-label="Chọn giọng">
            <option value="nam">Miền Nam</option>
            <option value="bac">Miền Bắc</option>
          </select>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="lesson-head">
      <h1 id="title">Đang tải…</h1>
    </div>
    <section id="sections" class="input-sections"></section>
    <div class="back-row">
      <button type="button" class="btn-input" id="back-btn">← back</button>
    </div>
  </main>

  <script>
    document.getElementById('back-btn').addEventListener('click', function () {
      if (history.length > 1) history.back(); else location.href = 'index.html';
    });
    const inputId = new URLSearchParams(location.search).get('id') || 'pronouns';
    const $title = document.getElementById('title');
    const $sections = document.getElementById('sections');

    function el(tag, cls, txt) {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (txt != null) n.textContent = txt;
      return n;
    }

    // "anh (I)" -> term "anh" đậm, "(I)" mờ
    function cell(text) {
      const td = el('td');
      const i = text.indexOf('(');
      if (i > 0) {
        td.appendChild(el('span', 'term', text.slice(0, i).trim()));
        td.appendChild(document.createTextNode(' '));
        td.appendChild(el('span', 'gloss', text.slice(i).trim()));
      } else {
        td.appendChild(el('span', 'term', text));
      }
      return td;
    }

    // bôi đậm từ đang được định nghĩa
    var TERMS = [];
    function esc(s) { return s.replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
    function boldEl(tag, cls, text) {
      var n = el(tag, cls);
      var html = esc(text);
      TERMS.forEach(function (t) {
        if (!t) return;
        var re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        html = html.replace(re, '<strong>$1</strong>');
      });
      n.innerHTML = html;
      return n;
    }

    function renderBlock(b) {
      if (b.type === 'text') {
        return boldEl('p', null, b.text);
      }
      if (b.type === 'table') {
        const t = el('table', 'tbl');
        const thead = el('thead'); const htr = el('tr');
        (b.columns || []).forEach(function (c) { htr.appendChild(el('th', null, c)); });
        thead.appendChild(htr); t.appendChild(thead);
        const tb = el('tbody');
        (b.rows || []).forEach(function (row) {
          const tr = el('tr');
          row.forEach(function (c) { tr.appendChild(cell(c)); });
          tb.appendChild(tr);
        });
        t.appendChild(tb);
        return t;
      }
      if (b.type === 'example') {
        const d = el('div', 'example');
        if (b.context) d.appendChild(el('div', 'ex-context', b.context));
        if (b.vi) d.appendChild(boldEl('div', 'ex-vi', b.vi));
        if (b.en) d.appendChild(el('div', 'ex-en', b.en));
        return d;
      }
      return document.createComment('unknown block');
    }

    function render(data) {
      TERMS = data.terms || [];
      document.title = (data.title || 'Core inputs') + ' — hoc voi hanh';
      $title.textContent = data.title || 'Core inputs';
      $sections.innerHTML = '';
      (data.sections || []).forEach(function (s) {
        const card = el('div', 'input-card');
        if (s.label) card.appendChild(el('span', 'badge-label', s.label));
        (s.blocks || []).forEach(function (b) { card.appendChild(renderBlock(b)); });
        $sections.appendChild(card);
      });
    }

    const inputLevel = new URLSearchParams(location.search).get('level') || '';

    (async function () {
      const path = inputLevel
        ? inputLevel + '/inputs/' + inputId + '.json'
        : 'inputs/' + inputId + '.json';   // fallback nếu không có level
      try {
        const res = await fetch(path, { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        render(await res.json());
      } catch (err) {
        console.error(err);
        $title.textContent = 'Không tải được trang';
        $sections.innerHTML = '<p class="note">Không tìm thấy <code>' + path + '</code>.</p>';
      }
    })();
  </script>
  <script>
    (function () {
      var v = "nam";
      try { v = localStorage.getItem("voice") || "nam"; } catch (e) {}
      var sel = document.getElementById("voice-select");
      if (sel) {
        sel.value = v;
        sel.addEventListener("change", function () {
          try { localStorage.setItem("voice", sel.value); } catch (e) {}
        });
      }
      var ls = document.getElementById("level-select");
      if (ls) {
        ls.value = new URLSearchParams(location.search).get("level") || "";
        ls.addEventListener("change", function () {
          location.href = ls.value ? ("index.html?level=" + encodeURIComponent(ls.value)) : "index.html";
        });
      }
    })();
  </script>
</body>
</html>
