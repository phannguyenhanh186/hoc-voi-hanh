<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hoc voi hanh — Học tiếng Việt qua truyện</title>
  <meta name="description" content="Đọc truyện tiếng Việt theo cụm từ, nghe audio thật, ẩn/hiện nghĩa tiếng Anh." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <select class="level-select" id="level-select" aria-label="Chọn cấp độ">
            <option value="">các lớp</option>
            <option value="mam">lớp mầm</option>
            <option value="choi">lớp chồi</option>
            <option value="la">lớp lá</option>
          </select>
          <select class="voice-select" id="voice-select" aria-label="Chọn giọng">
            <option value="nam">Miền Nam</option>
            <option value="bac">Miền Bắc</option>
          </select>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Học tiếng Việt <em>qua truyện</em>.</h1>
      <p>Bấm vào từng cụm từ để nghe và xem nghĩa. Nghe lại cả câu hoặc cả bài bất cứ lúc nào.</p>
    </section>

    <p class="section-label">Bài học</p>
    <div class="cards" id="cards">
      <p class="note">Đang tải danh sách bài học…</p>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">hoc voi hanh · học đi đôi với hành</div>
  </footer>

  <script>
    // nhãn hiển thị cho từng cấp độ
    const LEVELS = { mam: 'mầm', choi: 'chồi', la: 'lá' };

    (async function () {
      const cards = document.getElementById('cards');
      const activeLevel = new URLSearchParams(location.search).get('level') || '';

      // dropdown cấp độ: phản ánh filter hiện tại + đổi thì lọc lại
      const levelSel = document.getElementById('level-select');
      if (levelSel) {
        levelSel.value = activeLevel;
        levelSel.addEventListener('change', function () {
          location.href = levelSel.value ? ('index.html?level=' + encodeURIComponent(levelSel.value)) : 'index.html';
        });
      }

      try {
        const res = await fetch('manifest.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        let lessons = await res.json();
        if (!Array.isArray(lessons)) lessons = [];

        // lọc theo cấp độ nếu có
        const shown = activeLevel ? lessons.filter(function (l) { return l.level === activeLevel; }) : lessons;

        if (shown.length === 0) {
          cards.innerHTML = '<p class="note">Chưa có bài học nào' + (activeLevel ? ' ở cấp độ này' : '') + '.</p>';
          return;
        }

        cards.innerHTML = '';
        shown.forEach(function (l) {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = 'lesson.html?id=' + encodeURIComponent(l.id) + (l.level ? '&level=' + encodeURIComponent(l.level) : '');

          const head = document.createElement('div');
          head.className = 'card-head';
          const h3 = document.createElement('h3');
          h3.textContent = 'Bài ' + (l.num || '') + ': ' + (l.title || l.id);
          if (l.titleEn) {
            const en = document.createElement('span');
            en.className = 'title-en';
            en.textContent = ' (' + l.titleEn + ')';
            h3.appendChild(en);
          }
          head.appendChild(h3);
          if (l.level && LEVELS[l.level]) {
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = 'lớp ' + LEVELS[l.level];
            head.appendChild(badge);
          }
          a.appendChild(head);

          const p = document.createElement('p');
          p.textContent = l.description || '';
          a.appendChild(p);

          const go = document.createElement('div');
          go.className = 'go';
          go.textContent = 'Vào học →';
          a.appendChild(go);

          cards.appendChild(a);
        });
      } catch (err) {
        console.error(err);
        cards.innerHTML = '<p class="note">Không tải được danh sách bài học. Nếu đang mở bằng cách nháy đúp file, hãy chạy qua web server (xem README) hoặc deploy lên GitHub Pages.</p>';
      }
    })();
  </script>
  <script>
    (function () {
      var v = "nam";
      try { v = localStorage.getItem("voice") || "nam"; } catch (e) {}
      var sel = document.getElementById("voice-select");
      if (sel) {
        sel.value = v;
        sel.addEventListener("change", function () {
          try { localStorage.setItem("voice", sel.value); } catch (e) {}
        });
      }
    })();
  </script>
</body>
</html>
