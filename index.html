<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học với Hạnh — Tiếng Việt cho người nước ngoài</title>
  <meta name="description" content="Luyện nghe và ôn từ vựng tiếng Việt qua các bài học tương tác." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="site-header">
  <div class="logo">Học với <span>Hạnh</span></div>
  <nav>
    <a href="index.html">Trang chủ</a>
  </nav>
</header>

<!-- ========== MAIN ========== -->
<main>
  <section class="hero">
    <h1>Học Tiếng Việt<br>cùng Hạnh 🇻🇳</h1>
    <p>Luyện nghe, đọc và ghi nhớ từ vựng qua các bài hội thoại thật — click vào từng cụm từ để nghe phát âm.</p>
  </section>

  <div class="container">
    <h2 class="section-title">Tất cả bài học</h2>

    <!-- Cards are rendered here by JavaScript -->
    <div class="cards-grid" id="cards-grid">
      <p class="empty-state">Đang tải danh sách bài học...</p>
    </div>
  </div>
</main>

<!-- ========== FOOTER ========== -->
<footer class="site-footer">
  <p>Học với Hạnh &copy; 2025 &nbsp;·&nbsp; Tiếng Việt cho người nước ngoài</p>
</footer>

<script>
  /* -------------------------------------------------------
   * LESSON REGISTRY
   * Thêm bài mới: thêm một object vào mảng LESSONS bên dưới.
   * file: đường dẫn tới file JSON (trong thư mục lessons/)
   * ------------------------------------------------------- */
  const LESSONS = [
    { file: 'lessons/lesson1.json' },
    // { file: 'lessons/lesson2.json' },  ← bỏ comment khi có bài mới
  ];

  async function loadLesson(lessonMeta) {
    try {
      const res = await fetch(lessonMeta.file);
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();
      return { ...data, _file: lessonMeta.file };
    } catch {
      return null;
    }
  }

  function createCard(lesson, index) {
    const params = new URLSearchParams({ lesson: lesson._file });
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <span class="card-badge">${lesson.level || 'Bài học'}</span>
      <h2>${lesson.title || 'Bài ' + (index + 1)}</h2>
      <p>${lesson.description || ''}</p>
      <a class="card-link" href="lesson.html?${params}">
        Học ngay
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </a>
    `;
    return card;
  }

  async function init() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    const results = await Promise.all(LESSONS.map(loadLesson));
    const loaded = results.filter(Boolean);

    if (loaded.length === 0) {
      grid.innerHTML = '<p class="empty-state">Chưa có bài học nào. Thêm file JSON vào thư mục lessons/.</p>';
      return;
    }

    loaded.forEach((lesson, i) => grid.appendChild(createCard(lesson, i)));
  }

  init();
</script>
</body>
</html>
