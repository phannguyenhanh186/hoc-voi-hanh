<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hoc voi hanh — Học tiếng Việt qua truyện</title>
  <meta name="description" content="Đọc truyện tiếng Việt theo cụm từ, nghe audio thật, ẩn/hiện nghĩa tiếng Anh." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="levels" id="levels">
          <a class="level" data-level="" href="index.html">all levels</a>
          <a class="level" data-level="mam" href="index.html?level=mam">mầm</a>
          <a class="level" data-level="choi" href="index.html?level=choi">chồi</a>
          <a class="level" data-level="la" href="index.html?level=la">lá</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Học tiếng Việt <em>qua truyện</em>.</h1>
      <p>Bấm vào từng cụm từ để nghe và xem nghĩa. Nghe lại cả câu hoặc cả bài bất cứ lúc nào.</p>
    </section>

    <p class="section-label">Bài học</p>
    <div class="cards" id="cards">
      <p class="note">Đang tải danh sách bài học…</p>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">hoc voi hanh · học đi đôi với hành</div>
  </footer>

  <script>
    // nhãn hiển thị cho từng cấp độ
    const LEVELS = { mam: 'mầm', choi: 'chồi', la: 'lá' };

    (async function () {
      const cards = document.getElementById('cards');
      const activeLevel = new URLSearchParams(location.search).get('level') || '';

      // đánh dấu mục nav đang chọn
      document.querySelectorAll('#levels .level').forEach(function (el) {
        if ((el.getAttribute('data-level') || '') === activeLevel) el.classList.add('active');
      });

      try {
        const res = await fetch('manifest.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        let lessons = await res.json();
        if (!Array.isArray(lessons)) lessons = [];

        // lọc theo cấp độ nếu có
        const shown = activeLevel ? lessons.filter(function (l) { return l.level === activeLevel; }) : lessons;

        if (shown.length === 0) {
          cards.innerHTML = '<p class="note">Chưa có bài học nào' + (activeLevel ? ' ở cấp độ này' : '') + '.</p>';
          return;
        }

        cards.innerHTML = '';
        shown.forEach(function (l) {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = 'lesson.html?id=' + encodeURIComponent(l.id);
          a.innerHTML = '<div class="badge"></div><h3></h3><p></p><div class="go">Vào bài →</div>';
          const badge = a.querySelector('.badge');
          if (l.level && LEVELS[l.level]) { badge.textContent = LEVELS[l.level]; }
          else { badge.remove(); }
          a.querySelector('h3').textContent = l.title || l.id;
          a.querySelector('p').textContent = l.description || '';
          cards.appendChild(a);
        });
      } catch (err) {
        console.error(err);
        cards.innerHTML = '<p class="note">Không tải được danh sách bài học. Nếu đang mở bằng cách nháy đúp file, hãy chạy qua web server (xem README) hoặc deploy lên GitHub Pages.</p>';
      }
    })();
  </script>
</body>
</html>
