<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bài học — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <a class="back-link" href="index.html">← trang chủ</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div class="lesson-head">
      <h1 id="title">Đang tải…</h1>
    </div>
    <div class="path-page-list" id="cards"><p class="note">Đang tải…</p></div>
  </main>

  <footer class="footer"><div class="wrap">hoc voi hanh · học đi đôi với hành</div></footer>

  <script>
    const LEVELS = { mam: 'mầm', choi: 'chồi', la: 'lá' };
    const LEVEL_MASCOT = { mam: '🌱', choi: '🌿', la: '🍃' };
    const activeLevel = new URLSearchParams(location.search).get('level') || 'mam';
    document.getElementById('title').textContent = 'Cấp ' + (LEVELS[activeLevel] || activeLevel);
    document.title = 'Cấp ' + (LEVELS[activeLevel] || activeLevel) + ' — hoc voi hanh';

    function readyCount(u) { return (u.items || []).filter(it => it.status !== 'todo').length; }

    function el(tag, cls) { const n = document.createElement(tag); if (cls) n.className = cls; return n; }

    function makeSectionCard(opts) {
      // opts: { eyebrow, title, ready, total, href, sample, mascot, isActive }
      const isActive = opts.ready > 0;
      const card = el('a', 'section-card ' + (isActive ? 'section-active' : 'section-todo'));
      card.href = isActive ? opts.href : '#';

      const main = el('div', 'section-main');
      const eyebrow = el('span', 'section-eyebrow'); eyebrow.textContent = opts.eyebrow; main.appendChild(eyebrow);
      const h2 = el('h3', 'section-title'); h2.textContent = opts.title; main.appendChild(h2);

      if (opts.total) {
        const bar = el('div', 'progress-bar');
        const fill = el('div', 'progress-fill');
        fill.style.width = Math.round((opts.ready / opts.total) * 100) + '%';
        bar.appendChild(fill);
        main.appendChild(bar);
        const count = el('div', 'section-count');
        count.style.marginTop = '8px';
        count.textContent = (isActive ? '' : '🔒 ') + opts.ready + '/' + opts.total + ' bài đã có';
        main.appendChild(count);
      }

      const ctaWrap = el('div', 'section-cta');
      const cta = el('span', 'btn-jump');
      cta.textContent = isActive ? 'Vào học →' : 'Sắp ra mắt';
      ctaWrap.appendChild(cta);
      main.appendChild(ctaWrap);
      card.appendChild(main);

      if (opts.sample) {
        const speech = el('div', 'section-speech');
        const bubble = el('div', 'speech-bubble'); bubble.textContent = opts.sample;
        const mascot = el('div', 'section-mascot'); mascot.textContent = opts.mascot;
        speech.appendChild(bubble); speech.appendChild(mascot);
        card.appendChild(speech);
      }
      return card;
    }

    (async function () {
      const cards = document.getElementById('cards');
      try {
        const data = await (await fetch(activeLevel + '/units.json', { cache: 'no-cache' })).json();
        cards.innerHTML = '';

        (data.selfStudy || []).forEach(s => {
          const ready = s.status !== 'todo';
          const card = makeSectionCard({
            eyebrow: 'Tự học', title: s.title, ready: ready ? 1 : 0, total: 1,
            href: s.id === 'tones' ? 'tones.html' : ('lesson.html?id=' + encodeURIComponent(s.id) + '&level=' + encodeURIComponent(activeLevel)),
            sample: s.titleEn || '', mascot: '📖'
          });
          cards.appendChild(card);
        });

        const units = data.units || [];
        if (!units.length) { cards.innerHTML += '<p class="note">Chưa có unit nào ở cấp này.</p>'; return; }

        units.forEach(u => {
          const ready = readyCount(u);
          const total = (u.items || []).length;
          const firstItem = (u.items || [])[0];
          cards.appendChild(makeSectionCard({
            eyebrow: 'Unit ' + u.num,
            title: u.title,
            ready: ready, total: total,
            href: 'unit.html?level=' + encodeURIComponent(activeLevel) + '&num=' + u.num,
            sample: firstItem ? firstItem.title : '',
            mascot: LEVEL_MASCOT[activeLevel] || '🌱'
          }));
        });
      } catch (e) { cards.innerHTML = '<p class="note">Could not load the lesson list.</p>'; }
    })();
  </script>
</body>
</html>
