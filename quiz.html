<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .lib-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 18px; }
    .lib-tab { border: 1.5px solid var(--stroke); background: var(--surface); color: var(--ink); border-radius: 999px; padding: 7px 16px; font-size: .9rem; font-weight: 700; font-family: var(--font-display); cursor: pointer; transition: transform .1s ease, box-shadow .1s ease; }
    .lib-tab.on { background: var(--ink); color: #fff; box-shadow: 3px 3px 0 0 var(--stroke); }
    .lib-tab:hover { transform: translate(-2px,-2px); box-shadow: 3px 3px 0 0 var(--stroke); }

    .lib-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 560px) { .lib-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 860px) { .lib-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .gcard { border: 1.5px solid var(--stroke); border-radius: 16px; padding: 16px 17px; min-height: 168px; display: flex; flex-direction: column; text-decoration: none; transition: transform .1s ease, box-shadow .1s ease; }
    .gcard:hover { transform: translate(-3px,-3px); box-shadow: 6px 6px 0 0 var(--stroke); }
    .gc-label { font-size: 11px; letter-spacing: .06em; font-weight: 700; margin-bottom: 6px; }
    .gc-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .gc-name { font-size: 1.2rem; font-weight: 700; font-family: var(--font-display); line-height: 1.15; }
    .gc-icon { font-size: 1.6rem; flex: none; line-height: 1; }
    .gc-desc { font-size: .85rem; line-height: 1.45; margin-top: 8px; }
    .gc-foot { margin-top: auto; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .gc-play { font-size: .85rem; font-weight: 700; text-decoration: underline; }
    .gc-best { font-size: .75rem; font-weight: 700; opacity: .8; }

    .quiz-top { display: flex; align-items: center; gap: 12px; padding: 18px 0 6px; }
    .progress { flex: 1; height: 12px; background: #ECEBFB; border: 1.5px solid var(--stroke); border-radius: 999px; overflow: hidden; }
    .progress > i { display: block; height: 100%; width: 0; background: #B6E3B0; transition: width .25s ease; }
    .quiz-score { font-weight: 700; font-family: var(--font-display); flex: none; }

    .q-card { background: var(--surface); border: 1.5px solid var(--stroke); border-radius: var(--radius); padding: 20px; margin-top: 14px; }
    .q-kind { font-size: .78rem; font-weight: 700; letter-spacing: .04em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .q-prompt { font-size: 1.45rem; font-family: var(--font-display); margin: 2px 0 4px; }
    .q-sub { color: var(--muted); margin-bottom: 14px; }

    .options { display: grid; gap: 10px; }
    @media (min-width: 480px) { .options.two { grid-template-columns: 1fr 1fr; } }
    .opt { text-align: left; background: var(--surface); border: 1.5px solid var(--stroke); border-radius: 14px; padding: 13px 15px; font-size: 1.05rem; cursor: pointer; font-family: var(--font-body); transition: transform .1s ease, box-shadow .1s ease, background .15s; }
    .opt:hover { transform: translate(-2px,-2px); box-shadow: 4px 4px 0 0 var(--stroke); }
    .opt.correct { background: #B6E3B0; } .opt.wrong { background: #F7C5C5; }

    .tiles, .answer-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .answer-row { min-height: 52px; border: 1.5px dashed var(--stroke); border-radius: 14px; padding: 10px; margin-bottom: 12px; background: #FAFAFF; }
    .tile { background: var(--primary); border: 1.5px solid var(--stroke); border-radius: 12px; padding: 9px 13px; font-size: 1.05rem; cursor: pointer; font-family: var(--font-body); }
    .tile:active { transform: scale(.97); } .tile.used { opacity: .35; pointer-events: none; }

    .match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .match-col { display: grid; gap: 10px; }
    .mtile { background: var(--surface); border: 1.5px solid var(--stroke); border-radius: 12px; padding: 12px; cursor: pointer; font-size: 1.02rem; }
    .mtile.sel { background: var(--primary); } .mtile.done { background: #B6E3B0; pointer-events: none; opacity: .7; } .mtile.bad { background: #F7C5C5; }

    .txt-in { width: 100%; box-sizing: border-box; border: 1.5px solid var(--stroke); border-radius: 12px; padding: 13px 15px; font-size: 1.1rem; font-family: var(--font-body); }
    .mic-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff; border: 1.5px solid var(--stroke); border-radius: 999px; padding: 11px 18px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: var(--font-display); transition: transform .1s ease, box-shadow .1s ease; }
    .mic-btn:hover { transform: translate(-2px,-2px); box-shadow: 4px 4px 0 0 var(--stroke); }
    .mic-btn.ghost { background: var(--surface); color: var(--ink); }
    .mic-btn:disabled { opacity: .45; pointer-events: none; }
    .spk-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .heard { margin-top: 12px; color: var(--muted); font-size: .92rem; }
    .beta-note { font-size: .8rem; color: var(--muted); margin-top: 6px; }

    .q-actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
    .btn-primary { background: var(--accent-deep); color: #fff; border: 1.5px solid var(--stroke); border-radius: 999px; padding: 11px 22px; font-weight: 700; cursor: pointer; font-family: var(--font-display); font-size: 1rem; transition: transform .1s ease, box-shadow .1s ease; }
    .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 4px 4px 0 0 var(--stroke); }
    .btn-ghost { background: transparent; border: none; color: var(--muted); cursor: pointer; font-weight: 600; text-decoration: none; }
    .feedback { font-weight: 700; } .feedback.ok { color: #2F8F4E; } .feedback.no { color: #C23B3B; }

    .end-card { text-align: center; padding: 34px 20px; }
    .end-score { font-size: 3rem; font-family: var(--font-display); margin: 6px 0; }
    .note-warn { background: #FFF6E5; border: 1.5px solid var(--stroke); border-radius: 12px; padding: 10px 13px; color: #6b4e1f; font-size: .9rem; margin-top: 12px; }
    .explain { margin-top: 14px; background: #F4F4EC; border: 1.5px solid var(--stroke); border-radius: 12px; padding: 12px 15px; font-size: .95rem; line-height: 1.55; }
    .set-tag { font-size: .72rem; font-weight: 700; letter-spacing: .05em; color: var(--accent-deep); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right"><a class="back-link" id="back-lesson" href="#">← lesson</a></div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="topbar" class="quiz-top" style="display:none"><div class="progress"><i id="bar"></i></div><span class="quiz-score" id="score">0</span></div>
    <div class="lesson-head"><h1 id="qtitle">Practice</h1></div>
    <div id="stage"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const lessonId = params.get('id');
    const level = params.get('level') || 'mam';
    const type = params.get('type');
    const stage = document.getElementById('stage');
    const bar = document.getElementById('bar');
    const scoreEl = document.getElementById('score');
    const topbar = document.getElementById('topbar');
    (function(){ const bl = document.getElementById('back-lesson'); const enc = encodeURIComponent; if (type) { bl.href = 'quiz.html?id=' + enc(lessonId) + '&level=' + enc(level); bl.textContent = '← practice'; } else { bl.href = 'lesson.html?id=' + enc(lessonId) + '&level=' + enc(level); bl.textContent = '← lesson'; } })();

    let voice = 'nam'; try { voice = localStorage.getItem('voice') || 'nam'; } catch (e) {}
    const norm = s => (s || '').toLowerCase().normalize('NFC').replace(/[.,!?…"'/]/g, '').replace(/\s+/g, ' ').trim();
    const stripD = s => (s || '').normalize('NFD').replace(/[\u0300-\u0323]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
    function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
    function sample(a, n) { return shuffle(a).slice(0, n); }
    const cleanGloss = en => en && !/^\(/.test(en) && !/\?/.test(en) && !/^…/.test(en);
    function speak(t) { if (!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'vi-VN'; const v = (speechSynthesis.getVoices() || []).find(x => /vi/i.test(x.lang)); if (v) u.voice = v; u.rate = .9; speechSynthesis.speak(u); }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    const TONE_NAMES = ['Ngang', 'Huyền', 'Sắc', 'Hỏi', 'Ngã', 'Nặng'];
    const TONE_GLYPH = { Ngang: 'a', Huyền: 'à', Sắc: 'á', Hỏi: 'ả', Ngã: 'ã', Nặng: 'ạ' };
    function toneOf(syl) {
      const d = (syl || '').normalize('NFD');
      if (/\u0301/.test(d)) return 'Sắc';
      if (/\u0300/.test(d)) return 'Huyền';
      if (/\u0309/.test(d)) return 'Hỏi';
      if (/\u0303/.test(d)) return 'Ngã';
      if (/\u0323/.test(d)) return 'Nặng';
      return 'Ngang';
    }

    const P = { purple: '#C0BFF9', yellow: '#FFDC9A', mint: '#B6E3B0', blue: '#BBD4F5', coral: '#F4B6A8', teal: '#A9DBD0', ink: '#23223B' };
    const SKILLS = [
      { key: 'Reading', games: [
        { id: 'matching', name: 'Matching', desc: 'Match each word to its meaning.', icon: '🔗', c: P.purple },
        { id: 'gap', name: 'Gap Filling', desc: 'Pick the missing word in a sentence.', icon: '✏️', c: P.yellow },
        { id: 'reorder', name: 'Reorder', desc: 'Reorder scrambled words into a sentence.', icon: '🧩', c: P.blue },
      ] },
      { key: 'Writing', games: [
        { id: 'build', name: 'Sentence Builder', desc: 'Build a sentence from a word bank.', icon: '🧱', c: P.ink, dark: true },
        { id: 'diacritics', name: 'Tone Marks', desc: 'Choose the correct tone mark.', icon: '🔤', c: P.mint },
        { id: 'translate', name: 'Translate', desc: 'Choose the correct Vietnamese.', icon: '🔄', c: P.coral },
      ] },
      { key: 'Speaking', games: [
        { id: 'shadow', name: 'Shadowing', desc: 'Listen, then repeat the sentence.', icon: '🎙️', c: P.coral },
        { id: 'readaloud', name: 'Read Aloud', desc: 'Read the sentence aloud.', icon: '🗣️', c: P.ink, dark: true },
        { id: 'answer', name: 'Quick Answer', desc: 'Answer aloud using the target word.', icon: '⚡', c: P.blue },
      ] },
      { key: 'Listening', games: [
        { id: 'dictation', name: 'Dictation', desc: 'Hear it, then type what you heard.', icon: '⌨️', c: P.purple },
        { id: 'tone', name: 'Name the Tone', desc: 'Hear a word, name its tone.', icon: '〰️', c: P.blue },
        { id: 'listenpick', name: 'Listen & Choose', desc: 'Match the audio to its meaning.', icon: '🎧', c: P.coral },
      ] },
    ];
    const GAME = {}; SKILLS.forEach(s => s.games.forEach(g => { GAME[g.id] = Object.assign({ skill: s.key }, g); }));

    (async function () {
      let lesson, vocab = null, custom = {};
      try {
        lesson = await (await fetch(level + '/lessons/' + lessonId + '.json', { cache: 'no-cache' })).json();
        if (lesson.vocab) { const r = await fetch(level + '/vocab/' + lesson.vocab + '.json', { cache: 'no-cache' }); if (r.ok) vocab = await r.json(); }
        try { const rp = await fetch(level + '/practice/' + lessonId + '.json', { cache: 'no-cache' }); if (rp.ok) custom = await rp.json(); } catch (e) {}
      } catch (e) { stage.innerHTML = '<p class="note-warn">Could not load lesson data.</p>'; return; }

      const pairs = []; const seen = new Set();
      function addPair(vi, en) { if (!vi || !cleanGloss(en)) return; const k = norm(vi) + '|' + norm(en); if (seen.has(k)) return; seen.add(k); pairs.push({ vi: vi, en: en }); }
      (vocab ? vocab.sections : []).forEach(s => (s.items || []).forEach(it => { if (it.vi && it.en && !/⟷/.test(it.vi)) addPair(it.vi, it.en); }));
      lesson.sentences.forEach(s => (s.phrases || []).forEach(p => { if (p.vi) addPair(p.vi, p.en); }));
      const sentences = lesson.sentences.filter(s => s.phrases).map(s => ({ toks: s.phrases.filter(p => p.vi).map(p => p.vi), en: s.translation })).filter(s => s.toks.length >= 3 && s.toks.length <= 9 && s.en);
      const allToks = Array.from(new Set([].concat.apply([], sentences.map(s => s.toks))));
      const singles = pairs.filter(p => !/\s/.test(p.vi) && /[a-zà-ỹ]/i.test(p.vi));
      function pickSrc() { let src = sentences.filter(s => s.toks.length <= 5); if (src.length < 3) src = sentences.filter(s => s.toks.length <= 6); if (src.length < 3) src = sentences.filter(s => s.toks.length <= 7); if (src.length < 2) src = sentences.slice().sort((a, b) => a.toks.length - b.toks.length).slice(0, 3); return src; }
      const shortS = pickSrc();
      function shortPick(n) { return sample(shortS, Math.min(n, shortS.length)); }
      function take(pool, n) { if (!pool.length) return []; const out = []; let bag = []; while (out.length < n) { if (!bag.length) bag = shuffle(pool); out.push(bag.pop()); } return out; }
      const shortWords = pairs.filter(p => (p.vi.split(' ').length <= 3));

      if ('speechSynthesis' in window) speechSynthesis.getVoices();
      if (!type) { showLibrary(); return; }
      runDrill(type);

      // ---------- LIBRARY ----------
      function showLibrary() {
        document.getElementById('qtitle').textContent = 'Practice Library';
        const tabsWrap = document.createElement('div'); tabsWrap.className = 'lib-tabs';
        const grid = document.createElement('div'); grid.className = 'lib-grid';
        let active = 0;
        function paint() {
          tabsWrap.innerHTML = '';
          SKILLS.forEach((s, i) => { const b = document.createElement('button'); b.className = 'lib-tab' + (i === active ? ' on' : ''); b.textContent = s.key; b.onclick = () => { active = i; paint(); }; tabsWrap.appendChild(b); });
          grid.innerHTML = '';
          SKILLS[active].games.forEach(g => {
            const fgT = g.dark ? '#fff' : '#23223B', fgD = g.dark ? 'rgba(255,255,255,.82)' : 'rgba(35,34,59,.72)', fgL = g.dark ? 'rgba(255,255,255,.7)' : 'rgba(35,34,59,.6)';
            const a = document.createElement('a'); a.className = 'gcard'; a.style.background = g.c;
            a.href = 'quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level) + '&type=' + g.id;
            let best = 0; try { best = parseInt(localStorage.getItem('quizbest:' + level + ':' + lessonId + ':' + g.id) || '0', 10); } catch (e) {}
            a.innerHTML =
              '<div class="gc-label" style="color:' + fgL + '">' + SKILLS[active].key + '</div>'
              + '<div class="gc-row"><div class="gc-name" style="color:' + fgT + '">' + g.name + '</div><span class="gc-icon">' + g.icon + '</span></div>'
              + '<div class="gc-desc" style="color:' + fgD + '">' + g.desc + '</div>'
              + '<div class="gc-foot"><span class="gc-play" style="color:' + fgT + '">Play →</span>' + (best ? '<span class="gc-best" style="color:' + fgT + '">' + best + '%</span>' : '') + '</div>';
            grid.appendChild(a);
          });
        }
        paint();
        stage.appendChild(tabsWrap); stage.appendChild(grid);
      }

      // ---------- GENERATORS ----------
      function distract(val, key, n) { return sample(pairs.filter(p => norm(p[key]) !== norm(val)).map(p => p[key]), n); }
      function toneOpts(answer) { return shuffle([answer].concat(sample(TONE_NAMES.filter(x => x !== answer), 3))); }
      function gen(tp) {
        if (tp === 'matching') { if (pairs.length < 4) return []; const rounds = Math.min(3, Math.max(1, Math.floor(pairs.length / 5))); const pool = shuffle(pairs); const out = []; for (let i = 0; i < rounds; i++) { let set = pool.slice(i * 5, i * 5 + 5); if (set.length < 3) set = sample(pairs, Math.min(5, pairs.length)); out.push({ t: 'match', set: set }); } return out; }
        if (tp === 'gap') { if (custom.gap && custom.gap.items && custom.gap.items.length) return sample(custom.gap.items, Math.min(10, custom.gap.items.length)).map(it => ({ t: 'gapCustom', q: it.q, a: it.a, en: it.en, ex: it.ex, set: it.set, options: (it.opts && it.opts.length ? it.opts : [it.a]) })); const gsrc = (shortS.length >= 3 ? shortS : sentences).filter(s => s.toks.length >= 4); const pool = []; gsrc.forEach(s => { for (let i = 1; i < s.toks.length; i++) pool.push({ toks: s.toks, bi: i, en: s.en, a: s.toks[i] }); }); if (!pool.length) return []; return take(pool, 10).map(it => ({ t: 'gapCustom', q: it.toks.map((t, i) => i === it.bi ? '___' : t).join(' '), a: it.a, en: it.en, ex: 'The missing word is “' + it.a + '”. Full sentence: “' + it.toks.join(' ') + '” — ' + it.en, options: shuffle([it.a].concat(sample(allToks.filter(x => norm(x) !== norm(it.a)), 3))) })); }
        if (tp === 'reorder') return take(shortS, 10).map(s => ({ t: 'reorder', toks: s.toks, en: s.en }));
        if (tp === 'build') { const target = (lessonId === 'lesson1') ? 10 : 14; return take(shortS, 10).map(s => { const dp = allToks.filter(x => s.toks.indexOf(x) < 0); const need = Math.max(3, target - s.toks.length); return { t: 'build', toks: s.toks, en: s.en, extra: sample(dp, Math.min(need, dp.length)) }; }); }
        if (tp === 'diacritics') return take(singles, 10).map(p => { const ans = toneOf(p.vi); return { t: 'diacritics', w: p.vi, en: p.en, answer: ans, options: toneOpts(ans) }; });
        if (tp === 'translate') { if (sentences.length < 2) return []; const others = sentences.map(s => s.toks.join(' ')); return take(shortS, 10).map(s => { const ans = s.toks.join(' '); return { t: 'translateMcq', en: s.en, answer: ans, options: shuffle([ans].concat(sample(others.filter(x => x !== ans), 3))) }; }); }
        if (tp === 'dictation') { const pool = shortWords.concat(shortS.map(s => ({ vi: s.toks.join(' '), en: s.en }))); return take(pool, 10).map(p => ({ t: 'dictation', vi: p.vi, en: p.en })); }
        if (tp === 'tone') return take(singles, 10).map(p => { const ans = toneOf(p.vi); return { t: 'tone', w: p.vi, en: p.en, answer: ans, options: toneOpts(ans) }; });
        if (tp === 'listenpick') { const pool = shortWords.concat(shortS.map(s => ({ vi: s.toks.join(' '), en: s.en }))); const ens = pool.map(p => p.en); return take(pool, 10).map(p => ({ t: 'listenpick', vi: p.vi, en: p.en, options: shuffle([p.en].concat(sample(ens.filter(e => e !== p.en), 3))) })); }
        if (tp === 'shadow' || tp === 'readaloud') return take(shortS, 10).map(s => ({ t: 'speak', mode: tp, vi: s.toks.join(' '), en: s.en }));
        if (tp === 'answer') return take(shortS, 10).map(s => { const tgt = s.toks.slice().sort((a, b) => b.length - a.length)[0]; return { t: 'speak', mode: 'answer', vi: s.toks.join(' '), en: s.en, target: tgt }; });
        return [];
      }

      // ---------- DRILL RUNNER ----------
      function runDrill(tp) {
        const meta = GAME[tp] || { name: tp, skill: '' };
        document.getElementById('qtitle').textContent = meta.name;
        const questions = gen(tp);
        if (!questions.length) { stage.innerHTML = '<p class="note-warn">Not enough data for this game in this lesson.</p><p style="margin-top:12px"><a class="btn-ghost" href="quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level) + '">← Practice Library</a></p>'; return; }
        topbar.style.display = 'flex';
        let idx = 0, correct = 0; const total = questions.length;
        function setBar() { bar.style.width = (idx / total * 100) + '%'; scoreEl.textContent = correct; }
        function mark(ok) { if (ok) correct++; scoreEl.textContent = correct; }
        function next() { idx++; setBar(); if (idx >= total) end(); else render(questions[idx]); }
        function actions(fb, ok) { const w = document.createElement('div'); w.className = 'q-actions'; if (fb) { const f = document.createElement('span'); f.className = 'feedback ' + (ok ? 'ok' : 'no'); f.textContent = fb; w.appendChild(f); } const b = document.createElement('button'); b.className = 'btn-primary'; b.style.marginLeft = 'auto'; b.textContent = idx + 1 >= total ? 'See results' : 'Next →'; b.onclick = next; w.appendChild(b); return w; }
        function card(kind, prompt, sub) { stage.innerHTML = ''; const c = document.createElement('div'); c.className = 'q-card'; const k = document.createElement('div'); k.className = 'q-kind'; k.textContent = kind; c.appendChild(k); if (prompt) { const p = document.createElement('div'); p.className = 'q-prompt'; p.innerHTML = prompt; c.appendChild(p); } if (sub) { const s = document.createElement('div'); s.className = 'q-sub'; s.innerHTML = sub; c.appendChild(s); } stage.appendChild(c); return c; }

        function render(q) { setBar(); ({ match: rMatch, gap: rGap, gapCustom: rGapCustom, reorder: rReorder, build: rBuild, diacritics: rTonePick, translateMcq: rTransMcq, dictation: rDict, tone: rTonePick, listenpick: rListen, speak: rSpeak })[q.t](q); }

        function mcqBox(c, opts, answer, onDone, revealText) {
          const box = document.createElement('div'); box.className = 'options two';
          shuffle(opts).forEach(o => { const b = document.createElement('button'); b.className = 'opt'; b.textContent = o; b.onclick = () => { box.querySelectorAll('.opt').forEach(x => x.disabled = true); const ok = norm(o) === norm(answer); b.classList.add(ok ? 'correct' : 'wrong'); if (!ok) box.querySelectorAll('.opt').forEach(x => { if (norm(x.textContent) === norm(answer)) x.classList.add('correct'); }); mark(ok); c.appendChild(actions((ok ? 'Correct!' : 'Answer: ' + answer) + (revealText ? ' — ' + revealText : ''), ok)); }; box.appendChild(b); });
          c.appendChild(box);
        }

        function rMatch(q) {
          const c = card('Matching', 'Match the words', 'Tap a tile on the left, then its match on the right');
          const cols = document.createElement('div'); cols.className = 'match-cols';
          const L = document.createElement('div'); L.className = 'match-col'; const R = document.createElement('div'); R.className = 'match-col';
          let sel = null, done = 0;
          shuffle(q.set).forEach(p => { const b = document.createElement('button'); b.className = 'mtile'; b.textContent = p.vi; b.dataset.k = norm(p.vi); L.appendChild(b); });
          shuffle(q.set).forEach(p => { const b = document.createElement('button'); b.className = 'mtile'; b.textContent = p.en; b.dataset.k = norm(p.vi); R.appendChild(b); });
          function clk(b) { if (b.classList.contains('done')) return; if (!sel) { sel = b; b.classList.add('sel'); return; } if (sel.parentNode === b.parentNode) { sel.classList.remove('sel'); sel = b; b.classList.add('sel'); return; } if (sel.dataset.k === b.dataset.k) { sel.classList.add('done'); b.classList.add('done'); sel.classList.remove('sel'); sel = null; done++; if (done === q.set.length) { mark(true); c.appendChild(actions('Done!', true)); } } else { const s = sel; b.classList.add('bad'); s.classList.add('bad'); setTimeout(() => { b.classList.remove('bad'); s.classList.remove('bad', 'sel'); }, 500); sel = null; } }
          L.querySelectorAll('.mtile').forEach(b => b.onclick = () => clk(b)); R.querySelectorAll('.mtile').forEach(b => b.onclick = () => clk(b));
          cols.appendChild(L); cols.appendChild(R); c.appendChild(cols);
        }

        function rGap(q) {
          const shown = q.toks.map((t, i) => i === q.bi ? '<u>____</u>' : t).join(' ');
          const c = card('Gap Filling', shown, (q.en ? q.en + '<br>' : '') + 'Choose the missing word');
          mcqBox(c, q.options, q.toks[q.bi]);
        }

        function rGapCustom(q) {
          const shown = q.q.replace('___', '<u>____</u>');
          const sub = (q.set ? '<span class="set-tag">' + q.set + '</span> · ' : '') + (q.en || '') + '<br>Choose the missing word';
          const c = card('Gap Filling', shown, sub);
          const box = document.createElement('div'); box.className = 'options two';
          shuffle(q.options).forEach(o => { const b = document.createElement('button'); b.className = 'opt'; b.textContent = o; b.onclick = () => {
            box.querySelectorAll('.opt').forEach(x => x.disabled = true);
            const ok = norm(o) === norm(q.a);
            b.classList.add(ok ? 'correct' : 'wrong');
            if (!ok) box.querySelectorAll('.opt').forEach(x => { if (norm(x.textContent) === norm(q.a)) x.classList.add('correct'); });
            mark(ok);
            const ex = document.createElement('div'); ex.className = 'explain'; ex.innerHTML = '<strong>' + (ok ? 'Correct!' : 'Answer: ' + q.a) + '</strong><br>' + (q.ex || '');
            c.appendChild(ex); c.appendChild(actions('', ok));
          }; box.appendChild(b); });
          c.appendChild(box);
        }

        function buildTiles(c, correctToks, tilePool) {
          const ans = document.createElement('div'); ans.className = 'answer-row'; const tiles = document.createElement('div'); tiles.className = 'tiles'; const chosen = [];
          shuffle(tilePool.map((t, i) => ({ t: t, i: i }))).forEach(o => { const b = document.createElement('button'); b.className = 'tile'; b.textContent = o.t; b.onclick = () => { if (b.classList.contains('used')) return; b.classList.add('used'); chosen.push(o.t); const a = document.createElement('button'); a.className = 'tile'; a.textContent = o.t; a.onclick = () => { a.remove(); b.classList.remove('used'); chosen.splice(chosen.indexOf(o.t), 1); }; ans.appendChild(a); }; tiles.appendChild(b); });
          c.appendChild(ans); c.appendChild(tiles);
          const ck = document.createElement('button'); ck.className = 'btn-primary'; ck.style.marginTop = '14px'; ck.textContent = 'Check';
          ck.onclick = () => { const ok = norm(chosen.join(' ')) === norm(correctToks.join(' ')); ck.remove(); mark(ok); c.appendChild(actions(ok ? 'Correct!' : 'Answer: ' + correctToks.join(' '), ok)); };
          c.appendChild(ck);
        }
        function rReorder(q) { const c = card('Reorder', q.en, 'Tap the words in the correct order'); buildTiles(c, q.toks, q.toks); }
        function rBuild(q) { const c = card('Sentence Builder', q.en, 'Pick and order the words — some are extra'); buildTiles(c, q.toks, q.toks.concat(q.extra)); }

        function rTransMcq(q) { const c = card('Translate', q.en, 'Which Vietnamese sentence is correct?'); mcqBox(c, q.options, q.answer); }

        function rTonePick(q) {
          const isAudio = q.t === 'tone';
          const c = card(isAudio ? 'Name the Tone' : 'Tone Marks', isAudio ? '🎧' : stripD(q.w), isAudio ? 'Listen and choose the tone' : ((q.en ? q.en + '<br>' : '') + 'Which tone does this word have?'));
          if (isAudio) { const play = document.createElement('button'); play.className = 'mic-btn'; play.textContent = '🔊 Replay'; play.onclick = () => speak(q.w); c.appendChild(play); c.appendChild(document.createElement('div')); speak(q.w); }
          const labeled = q.options.map(o => o + ' (' + TONE_GLYPH[o] + ')');
          const box = document.createElement('div'); box.className = 'options two';
          labeled.forEach(o => { const tone = o.split(' ')[0]; const b = document.createElement('button'); b.className = 'opt'; b.textContent = o; b.onclick = () => { box.querySelectorAll('.opt').forEach(x => x.disabled = true); const ok = tone === q.answer; b.classList.add(ok ? 'correct' : 'wrong'); if (!ok) box.querySelectorAll('.opt').forEach(x => { if (x.textContent.split(' ')[0] === q.answer) x.classList.add('correct'); }); mark(ok); c.appendChild(actions((ok ? 'Correct!' : 'Answer: ' + q.answer) + ' — ' + q.w + (q.en ? ' (' + q.en + ')' : ''), ok)); }; box.appendChild(b); });
          c.appendChild(box);
        }

        function rDict(q) {
          const c = card('Dictation', '🎧', 'Listen, then type it in Vietnamese (tone marks optional)');
          const play = document.createElement('button'); play.className = 'mic-btn'; play.textContent = '🔊 Replay'; play.onclick = () => speak(q.vi); c.appendChild(play); speak(q.vi);
          const inp = document.createElement('input'); inp.className = 'txt-in'; inp.style.marginTop = '14px'; inp.placeholder = 'Type what you hear…'; c.appendChild(inp); inp.focus();
          const ck = document.createElement('button'); ck.className = 'btn-primary'; ck.style.marginTop = '14px'; ck.textContent = 'Check';
          function submit() { const ok = norm(inp.value) === norm(q.vi) || stripD(norm(inp.value)) === stripD(norm(q.vi)); inp.disabled = true; ck.remove(); mark(ok); c.appendChild(actions(ok ? 'Correct! (' + q.vi + ')' : 'Answer: ' + q.vi, ok)); }
          ck.onclick = submit; inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
          c.appendChild(ck);
        }

        function rListen(q) {
          const c = card('Listen & Choose', '🎧', 'Listen, then choose the correct meaning');
          const play = document.createElement('button'); play.className = 'mic-btn'; play.textContent = '🔊 Replay'; play.onclick = () => speak(q.vi); c.appendChild(play); const sp = document.createElement('div'); sp.style.height = '12px'; c.appendChild(sp); speak(q.vi);
          mcqBox(c, q.options, q.en, null, q.vi);
        }

        let stream = null;
        function rSpeak(q) {
          const titleMap = { shadow: 'Shadowing', readaloud: 'Read Aloud', answer: 'Quick Answer' };
          const promptHtml = q.mode === 'answer' ? q.en : q.vi;
          const sub = q.mode === 'answer' ? ('Answer in Vietnamese using: <strong>' + q.target + '</strong>') : (q.en || '');
          const c = card(titleMap[q.mode], promptHtml, sub);
          const row = document.createElement('div'); row.className = 'spk-row';
          const model = document.createElement('button'); model.className = 'mic-btn ghost'; model.textContent = '🔊 Hear model'; model.onclick = () => speak(q.vi); row.appendChild(model);

          const heard = document.createElement('div'); heard.className = 'heard';
          if ('MediaRecorder' in window && navigator.mediaDevices) {
            const recBtn = document.createElement('button'); recBtn.className = 'mic-btn'; recBtn.textContent = '🎙 Record';
            const playBtn = document.createElement('button'); playBtn.className = 'mic-btn ghost'; playBtn.textContent = '▶ Play back'; playBtn.disabled = true;
            let rec = null, chunks = [], url = null;
            recBtn.onclick = async () => {
              if (rec && rec.state === 'recording') { rec.stop(); return; }
              try { if (!stream) stream = await navigator.mediaDevices.getUserMedia({ audio: true }); chunks = []; rec = new MediaRecorder(stream); rec.ondataavailable = e => chunks.push(e.data); rec.onstop = () => { if (url) URL.revokeObjectURL(url); url = URL.createObjectURL(new Blob(chunks)); playBtn.disabled = false; recBtn.textContent = '🎙 Re-record'; }; rec.start(); recBtn.textContent = '⏹ Stop'; } catch (e) { heard.textContent = 'Microphone not available.'; }
            };
            playBtn.onclick = () => { if (url) new Audio(url).play(); };
            row.appendChild(recBtn); row.appendChild(playBtn);
          }

          if (SR) {
            const chk = document.createElement('button'); chk.className = 'mic-btn'; chk.textContent = '✓ Check (beta)';
            chk.onclick = () => {
              const r = new SR(); r.lang = 'vi-VN'; r.interimResults = false; r.maxAlternatives = 1; heard.textContent = '🎤 Listening, speak now…';
              r.onresult = e => { const txt = e.results[0][0].transcript; let ok; if (q.mode === 'answer') ok = stripD(norm(txt)).indexOf(stripD(norm(q.target))) >= 0; else { const a = stripD(norm(txt)).split(' '), b = stripD(norm(q.vi)).split(' '); const hit = b.filter(w => a.indexOf(w) >= 0).length; ok = hit / b.length >= 0.6; } heard.innerHTML = (ok ? '✅ Words match! ' : '🔁 Not quite. ') + 'Heard: “' + txt + '”<div class="beta-note">* Words only — tones are not graded.</div>'; };
              r.onerror = () => { heard.textContent = 'Could not hear you, try again.'; };
              try { r.start(); } catch (e) {}
            };
            row.appendChild(chk);
          }
          c.appendChild(row);
          if (!SR) { const n = document.createElement('div'); n.className = 'beta-note'; n.textContent = 'This browser does not support the speech check — record and compare with the model yourself.'; c.appendChild(n); }
          c.appendChild(heard);

          const act = document.createElement('div'); act.className = 'q-actions';
          const good = document.createElement('button'); good.className = 'btn-primary'; good.textContent = '👍 Got it'; good.onclick = () => { mark(true); next(); };
          const retry = document.createElement('button'); retry.className = 'btn-ghost'; retry.textContent = (idx + 1 >= total ? 'Skip → results' : '🔁 Skip'); retry.onclick = () => next();
          act.appendChild(good); act.appendChild(retry); c.appendChild(act);
        }

        function end() {
          bar.style.width = '100%';
          const pct = Math.round(correct / total * 100);
          const key = 'quizbest:' + level + ':' + lessonId + ':' + tp;
          let best = 0; try { best = parseInt(localStorage.getItem(key) || '0', 10); } catch (e) {}
          if (pct > best) { try { localStorage.setItem(key, String(pct)); } catch (e) {} best = pct; }
          stage.innerHTML = '';
          const c = document.createElement('div'); c.className = 'q-card end-card';
          c.innerHTML = '<div class="q-kind">' + meta.name + '</div><div class="end-score">' + pct + '%</div><div class="q-sub">Correct ' + correct + '/' + total + ' · Best: ' + best + '%</div>';
          const again = document.createElement('button'); again.className = 'btn-primary'; again.textContent = '↻ Retry'; again.onclick = () => location.reload();
          const menu = document.createElement('a'); menu.className = 'btn-ghost'; menu.textContent = 'Practice Library'; menu.style.marginLeft = '12px'; menu.href = 'quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level);
          const row = document.createElement('div'); row.style.marginTop = '16px'; row.appendChild(again); row.appendChild(menu); c.appendChild(row);
          stage.appendChild(c);
        }

        render(questions[0]);
      }
    })();
  </script>
</body>
</html>
