<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luyện tập — hoc voi hanh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .quiz-top { display: flex; align-items: center; gap: 12px; padding: 18px 0 6px; }
    .progress { flex: 1; height: 12px; background: #ECEBFB; border: 1.5px solid var(--stroke); border-radius: 999px; overflow: hidden; }
    .progress > i { display: block; height: 100%; width: 0; background: #B6E3B0; transition: width .25s ease; }
    .quiz-score { font-weight: 700; font-family: var(--font-display); flex: none; }

    .q-card { background: var(--surface); border: 1.5px solid var(--stroke); border-radius: var(--radius); padding: 20px; margin-top: 14px; }
    .q-kind { font-size: .78rem; font-weight: 700; letter-spacing: .04em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .q-prompt { font-size: 1.45rem; font-family: var(--font-display); margin: 2px 0 4px; }
    .q-sub { color: var(--muted); margin-bottom: 14px; }

    .options { display: grid; gap: 10px; }
    @media (min-width: 480px) { .options.two { grid-template-columns: 1fr 1fr; } }
    .opt { text-align: left; background: var(--surface); border: 1.5px solid var(--stroke); border-radius: 14px; padding: 13px 15px; font-size: 1.05rem; cursor: pointer; font-family: var(--font-body); transition: transform .1s ease, background .15s; }
    .opt:hover { background: #F3F2FF; } .opt:active { transform: scale(.98); }
    .opt.correct { background: #B6E3B0; } .opt.wrong { background: #F7C5C5; }

    .tiles, .answer-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .answer-row { min-height: 52px; border: 1.5px dashed var(--stroke); border-radius: 14px; padding: 10px; margin-bottom: 12px; background: #FAFAFF; }
    .tile { background: var(--primary); border: 1.5px solid var(--stroke); border-radius: 12px; padding: 9px 13px; font-size: 1.05rem; cursor: pointer; font-family: var(--font-body); }
    .tile:active { transform: scale(.97); } .tile.used { opacity: .35; pointer-events: none; }

    .match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .match-col { display: grid; gap: 10px; }
    .mtile { background: var(--surface); border: 1.5px solid var(--stroke); border-radius: 12px; padding: 12px; cursor: pointer; font-size: 1.02rem; }
    .mtile.sel { background: var(--primary); } .mtile.done { background: #B6E3B0; pointer-events: none; opacity: .7; } .mtile.bad { background: #F7C5C5; }

    .txt-in { width: 100%; box-sizing: border-box; border: 1.5px solid var(--stroke); border-radius: 12px; padding: 13px 15px; font-size: 1.1rem; font-family: var(--font-body); }
    .mic-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--accent); color: #fff; border: 1.5px solid var(--stroke); border-radius: 999px; padding: 12px 20px; font-size: 1.02rem; font-weight: 700; cursor: pointer; font-family: var(--font-display); }

    .q-actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
    .btn-primary { background: var(--accent-deep); color: #fff; border: 1.5px solid var(--stroke); border-radius: 999px; padding: 11px 22px; font-weight: 700; cursor: pointer; font-family: var(--font-display); font-size: 1rem; }
    .btn-ghost { background: transparent; border: none; color: var(--muted); cursor: pointer; font-weight: 600; text-decoration: none; }
    .feedback { font-weight: 700; } .feedback.ok { color: #2F8F4E; } .feedback.no { color: #C23B3B; }

    .end-card { text-align: center; padding: 34px 20px; }
    .end-score { font-size: 3rem; font-family: var(--font-display); margin: 6px 0; }
    .note-warn { background: #FFF6E5; border: 1.5px solid var(--stroke); border-radius: 12px; padding: 10px 13px; color: #6b4e1f; font-size: .9rem; margin-top: 12px; }
    .type-emoji { font-size: 1.4rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="navbar">
        <a class="brand" href="index.html">hoc voi hanh</a>
        <div class="nav-right">
          <a class="level-select" id="back-lesson" style="text-decoration:none;display:inline-flex;align-items:center" href="#">← bài học</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <div id="topbar" class="quiz-top" style="display:none"><div class="progress"><i id="bar"></i></div><span class="quiz-score" id="score">0</span></div>
    <div class="lesson-head"><h1 id="qtitle">Luyện tập</h1></div>
    <div id="stage"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const lessonId = params.get('id');
    let level = params.get('level') || 'mam';
    const type = params.get('type');
    const stage = document.getElementById('stage');
    const bar = document.getElementById('bar');
    const scoreEl = document.getElementById('score');
    const topbar = document.getElementById('topbar');
    document.getElementById('back-lesson').href = 'lesson.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level);

    const norm = s => (s || '').toLowerCase().normalize('NFC').replace(/[.,!?…"'/]/g, '').replace(/\s+/g, ' ').trim();
    const stripD = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd');
    function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function sample(a, n) { return shuffle(a).slice(0, n); }
    const cleanGloss = en => en && !/^\(/.test(en) && !/\?/.test(en) && !/^…/.test(en);
    function speak(t) { if (!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'vi-VN'; const v = (speechSynthesis.getVoices() || []).find(x => /vi/i.test(x.lang)); if (v) u.voice = v; u.rate = .9; speechSynthesis.speak(u); }

    const TYPES = [
      { id: 'matching', emoji: '🔗', name: 'Matching', desc: 'Ghép từ với nghĩa của nó.' },
      { id: 'reorder', emoji: '🧩', name: 'Reorder', desc: 'Sắp xếp các từ thành câu đúng.' },
      { id: 'dictation', emoji: '🎧', name: 'Dictation', desc: 'Nghe và gõ lại bằng tiếng Việt.' },
      { id: 'gap', emoji: '✏️', name: 'Gap filling', desc: 'Điền từ còn thiếu trong câu.' },
      { id: 'translate', emoji: '🔁', name: 'Translating', desc: 'Dịch giữa Việt và Anh.' },
    ];

    (async function () {
      let lesson, vocab = null;
      try {
        lesson = await (await fetch(level + '/lessons/' + lessonId + '.json', { cache: 'no-cache' })).json();
        if (lesson.vocab) { const r = await fetch(level + '/vocab/' + lesson.vocab + '.json', { cache: 'no-cache' }); if (r.ok) vocab = await r.json(); }
      } catch (e) { stage.innerHTML = '<p class="note-warn">Không tải được dữ liệu bài học.</p>'; return; }

      const pairs = []; const seen = new Set();
      function addPair(vi, en) { if (!vi || !cleanGloss(en)) return; const k = norm(vi) + '|' + norm(en); if (seen.has(k)) return; seen.add(k); pairs.push({ vi, en }); }
      (vocab ? vocab.sections : []).forEach(s => (s.items || []).forEach(it => { if (it.vi && it.en && !/⟷/.test(it.vi)) addPair(it.vi, it.en); }));
      lesson.sentences.forEach(s => (s.phrases || []).forEach(p => { if (p.vi) addPair(p.vi, p.en); }));
      const sentences = lesson.sentences.filter(s => s.phrases).map(s => ({ toks: s.phrases.filter(p => p.vi).map(p => p.vi), en: s.translation })).filter(s => s.toks.length >= 3 && s.toks.length <= 9 && s.en);
      const allToks = Array.from(new Set([].concat.apply([], sentences.map(s => s.toks))));

      function distract(val, key, n) { return sample(pairs.filter(p => norm(p[key]) !== norm(val)).map(p => p[key]), n); }
      function gen(tp) {
        if (tp === 'matching') {
          if (pairs.length < 4) return [];
          const rounds = Math.min(3, Math.max(1, Math.floor(pairs.length / 5)));
          const pool = shuffle(pairs); const out = [];
          for (let i = 0; i < rounds; i++) { let set = pool.slice(i * 5, i * 5 + 5); if (set.length < 3) set = sample(pairs, Math.min(5, pairs.length)); out.push({ t: 'match', set }); }
          return out;
        }
        if (tp === 'reorder') return sample(sentences, Math.min(8, sentences.length)).map(s => ({ t: 'reorder', s }));
        if (tp === 'dictation') { const pool = pairs.concat(sentences.map(s => ({ vi: s.toks.join(' '), en: s.en }))); return sample(pool, Math.min(8, pool.length)).map(p => ({ t: 'dictation', vi: p.vi, en: p.en })); }
        if (tp === 'gap') {
          const usable = sentences.filter(s => s.toks.length >= 4);
          return sample(usable, Math.min(8, usable.length)).map(s => { const bi = 1 + Math.floor(Math.random() * (s.toks.length - 1)); const answer = s.toks[bi]; return { t: 'gap', toks: s.toks, bi, en: s.en, options: [answer].concat(sample(allToks.filter(t => norm(t) !== norm(answer)), 3)) }; });
        }
        if (tp === 'translate') {
          const out = [];
          sample(pairs, Math.min(4, pairs.length)).forEach(p => { if (distract(p.en, 'en', 3).length === 3) out.push({ t: 'mcq', kind: 'VI → EN', ask: p.vi, sub: 'Nghĩa tiếng Anh là gì?', answer: p.en, options: [p.en].concat(distract(p.en, 'en', 3)) }); });
          sample(pairs, Math.min(3, pairs.length)).forEach(p => { if (distract(p.vi, 'vi', 3).length === 3) out.push({ t: 'mcq', kind: 'EN → VI', ask: p.en, sub: 'Từ tiếng Việt nào đúng?', answer: p.vi, options: [p.vi].concat(distract(p.vi, 'vi', 3)) }); });
          const others = sentences.map(s => s.en);
          if (sentences.length >= 4) sample(sentences, Math.min(3, sentences.length)).forEach(s => out.push({ t: 'mcq', kind: 'Dịch câu', ask: s.toks.join(' '), sub: 'Câu này nghĩa là gì?', answer: s.en, options: [s.en].concat(sample(others.filter(e => e !== s.en), 3)) }));
          return shuffle(out).slice(0, 10);
        }
        return [];
      }

      if (!type) { showMenu(); if ('speechSynthesis' in window) speechSynthesis.getVoices(); return; }
      runDrill(type);
      if ('speechSynthesis' in window) speechSynthesis.getVoices();

      function showMenu() {
        document.getElementById('qtitle').textContent = 'Luyện tập — ' + (lesson.title || lessonId);
        const grid = document.createElement('div'); grid.className = 'cards';
        TYPES.forEach(t => {
          const a = document.createElement('a'); a.className = 'card';
          a.href = 'quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level) + '&type=' + t.id;
          const head = document.createElement('div'); head.className = 'card-head';
          const h3 = document.createElement('h3'); h3.innerHTML = '<span class="type-emoji">' + t.emoji + '</span> ' + t.name; head.appendChild(h3);
          let best = 0; try { best = parseInt(localStorage.getItem('quizbest:' + level + ':' + lessonId + ':' + t.id) || '0', 10); } catch (e) {}
          if (best) { const b = document.createElement('span'); b.className = 'badge'; b.textContent = best + '%'; head.appendChild(b); }
          a.appendChild(head);
          const p = document.createElement('p'); p.textContent = t.desc; a.appendChild(p);
          const go = document.createElement('div'); go.className = 'go'; go.textContent = 'Bắt đầu →'; a.appendChild(go);
          grid.appendChild(a);
        });
        stage.appendChild(grid);
      }

      function runDrill(tp) {
        const meta = TYPES.find(t => t.id === tp) || { name: tp, emoji: '' };
        document.getElementById('qtitle').textContent = meta.emoji + ' ' + meta.name;
        const questions = gen(tp);
        if (!questions.length) { stage.innerHTML = '<p class="note-warn">Chưa đủ dữ liệu cho dạng này ở bài này.</p><p style="margin-top:12px"><a class="btn-ghost" href="quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level) + '">← Chọn dạng khác</a></p>'; return; }
        topbar.style.display = 'flex';
        let idx = 0, correct = 0; const total = questions.length;
        function setBar() { bar.style.width = (idx / total * 100) + '%'; scoreEl.textContent = correct; }
        function mark(ok) { if (ok) correct++; scoreEl.textContent = correct; }
        function next() { idx++; setBar(); if (idx >= total) end(); else render(questions[idx]); }
        function actions(fb, ok) { const w = document.createElement('div'); w.className = 'q-actions'; if (fb) { const f = document.createElement('span'); f.className = 'feedback ' + (ok ? 'ok' : 'no'); f.textContent = fb; w.appendChild(f); } const b = document.createElement('button'); b.className = 'btn-primary'; b.style.marginLeft = 'auto'; b.textContent = idx + 1 >= total ? 'Xem kết quả' : 'Tiếp →'; b.onclick = next; w.appendChild(b); return w; }
        function card(kind, prompt, sub) { stage.innerHTML = ''; const c = document.createElement('div'); c.className = 'q-card'; const k = document.createElement('div'); k.className = 'q-kind'; k.textContent = kind; c.appendChild(k); if (prompt) { const p = document.createElement('div'); p.className = 'q-prompt'; p.innerHTML = prompt; c.appendChild(p); } if (sub) { const s = document.createElement('div'); s.className = 'q-sub'; s.innerHTML = sub; c.appendChild(s); } stage.appendChild(c); return c; }

        function render(q) { setBar(); ({ match: rMatch, reorder: rReorder, dictation: rDict, gap: rGap, mcq: rMcq })[q.t](q); }

        function rMcq(q) { const c = card(q.kind, q.ask, q.sub); const box = document.createElement('div'); box.className = 'options two'; shuffle(q.options).forEach(o => { const b = document.createElement('button'); b.className = 'opt'; b.textContent = o; b.onclick = () => { box.querySelectorAll('.opt').forEach(x => x.disabled = true); const ok = norm(o) === norm(q.answer); b.classList.add(ok ? 'correct' : 'wrong'); if (!ok) box.querySelectorAll('.opt').forEach(x => { if (norm(x.textContent) === norm(q.answer)) x.classList.add('correct'); }); mark(ok); c.appendChild(actions(ok ? 'Chính xác!' : 'Đáp án: ' + q.answer, ok)); }; box.appendChild(b); }); c.appendChild(box); }

        function rMatch(q) {
          const c = card('Matching', 'Ghép từ với nghĩa', 'Bấm một ô bên trái rồi ô tương ứng bên phải');
          const cols = document.createElement('div'); cols.className = 'match-cols';
          const L = document.createElement('div'); L.className = 'match-col'; const R = document.createElement('div'); R.className = 'match-col';
          let sel = null, done = 0;
          shuffle(q.set).forEach(p => { const b = document.createElement('button'); b.className = 'mtile'; b.textContent = p.vi; b.dataset.k = norm(p.vi); L.appendChild(b); });
          shuffle(q.set).forEach(p => { const b = document.createElement('button'); b.className = 'mtile'; b.textContent = p.en; b.dataset.k = norm(p.vi); R.appendChild(b); });
          function clk(b) { if (b.classList.contains('done')) return; if (!sel) { sel = b; b.classList.add('sel'); return; } if (sel.parentNode === b.parentNode) { sel.classList.remove('sel'); sel = b; b.classList.add('sel'); return; } if (sel.dataset.k === b.dataset.k) { sel.classList.add('done'); b.classList.add('done'); sel.classList.remove('sel'); sel = null; done++; if (done === q.set.length) { mark(true); c.appendChild(actions('Hoàn thành!', true)); } } else { const s = sel; b.classList.add('bad'); s.classList.add('bad'); setTimeout(() => { b.classList.remove('bad'); s.classList.remove('bad', 'sel'); }, 500); sel = null; } }
          L.querySelectorAll('.mtile').forEach(b => b.onclick = () => clk(b)); R.querySelectorAll('.mtile').forEach(b => b.onclick = () => clk(b));
          cols.appendChild(L); cols.appendChild(R); c.appendChild(cols);
        }

        function rReorder(q) {
          const c = card('Reorder', q.s.en, 'Bấm các từ theo đúng thứ tự');
          const ans = document.createElement('div'); ans.className = 'answer-row'; const tiles = document.createElement('div'); tiles.className = 'tiles'; const chosen = [];
          shuffle(q.s.toks.map((t, i) => ({ t, i }))).forEach(o => { const b = document.createElement('button'); b.className = 'tile'; b.textContent = o.t; b.onclick = () => { if (b.classList.contains('used')) return; b.classList.add('used'); chosen.push(o.t); const a = document.createElement('button'); a.className = 'tile'; a.textContent = o.t; a.onclick = () => { a.remove(); b.classList.remove('used'); chosen.splice(chosen.indexOf(o.t), 1); }; ans.appendChild(a); }; tiles.appendChild(b); });
          c.appendChild(ans); c.appendChild(tiles);
          const ck = document.createElement('button'); ck.className = 'btn-primary'; ck.style.marginTop = '14px'; ck.textContent = 'Kiểm tra';
          ck.onclick = () => { const ok = norm(chosen.join(' ')) === norm(q.s.toks.join(' ')); ck.remove(); mark(ok); c.appendChild(actions(ok ? 'Chính xác!' : 'Đáp án: ' + q.s.toks.join(' '), ok)); };
          c.appendChild(ck);
        }

        function rDict(q) {
          const c = card('Dictation', '🎧', 'Nghe rồi gõ lại bằng tiếng Việt (không bắt buộc dấu)');
          const play = document.createElement('button'); play.className = 'mic-btn'; play.textContent = '🔊 Nghe lại'; play.onclick = () => speak(q.vi); c.appendChild(play); speak(q.vi);
          const inp = document.createElement('input'); inp.className = 'txt-in'; inp.style.marginTop = '14px'; inp.placeholder = 'Gõ những gì bạn nghe…'; c.appendChild(inp); inp.focus();
          const ck = document.createElement('button'); ck.className = 'btn-primary'; ck.style.marginTop = '14px'; ck.textContent = 'Kiểm tra';
          function submit() { const ok = norm(inp.value) === norm(q.vi) || stripD(norm(inp.value)) === stripD(norm(q.vi)); inp.disabled = true; ck.remove(); mark(ok); c.appendChild(actions(ok ? 'Chính xác! (' + q.vi + ')' : 'Đáp án: ' + q.vi, ok)); }
          ck.onclick = submit; inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
          c.appendChild(ck);
        }

        function rGap(q) {
          const shown = q.toks.map((t, i) => i === q.bi ? '<u>____</u>' : t).join(' ');
          const c = card('Gap filling', shown, (q.en ? q.en + '<br>' : '') + 'Chọn từ còn thiếu');
          const box = document.createElement('div'); box.className = 'options two';
          shuffle(q.options).forEach(o => { const b = document.createElement('button'); b.className = 'opt'; b.textContent = o; b.onclick = () => { box.querySelectorAll('.opt').forEach(x => x.disabled = true); const ok = norm(o) === norm(q.toks[q.bi]); b.classList.add(ok ? 'correct' : 'wrong'); if (!ok) box.querySelectorAll('.opt').forEach(x => { if (norm(x.textContent) === norm(q.toks[q.bi])) x.classList.add('correct'); }); mark(ok); c.appendChild(actions(ok ? 'Chính xác!' : 'Đáp án: ' + q.toks[q.bi], ok)); }; box.appendChild(b); });
          c.appendChild(box);
        }

        function end() {
          bar.style.width = '100%';
          const pct = Math.round(correct / total * 100);
          const key = 'quizbest:' + level + ':' + lessonId + ':' + tp;
          let best = 0; try { best = parseInt(localStorage.getItem(key) || '0', 10); } catch (e) {}
          if (pct > best) { try { localStorage.setItem(key, String(pct)); } catch (e) {} best = pct; }
          stage.innerHTML = '';
          const c = document.createElement('div'); c.className = 'q-card end-card';
          c.innerHTML = '<div class="q-kind">' + meta.name + '</div><div class="end-score">' + pct + '%</div><div class="q-sub">Đúng ' + correct + '/' + total + ' · Cao nhất: ' + best + '%</div>';
          const again = document.createElement('button'); again.className = 'btn-primary'; again.textContent = '↻ Làm lại'; again.onclick = () => location.reload();
          const menu = document.createElement('a'); menu.className = 'btn-ghost'; menu.textContent = 'Chọn dạng khác'; menu.style.marginLeft = '12px'; menu.href = 'quiz.html?id=' + encodeURIComponent(lessonId) + '&level=' + encodeURIComponent(level);
          const row = document.createElement('div'); row.style.marginTop = '16px'; row.appendChild(again); row.appendChild(menu); c.appendChild(row);
          stage.appendChild(c);
        }

        render(questions[0]);
      }
    })();
  </script>
</body>
</html>
